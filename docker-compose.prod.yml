# Production stack for JobHunt — Caddy (auto-HTTPS) in front of a static frontend
# build + the FastAPI backend + Celery worker/beat + Postgres + Redis.
#
# Deploy:  docker-compose -f docker-compose.prod.yml --env-file .env.production up -d --build
# Migrate: docker-compose -f docker-compose.prod.yml --env-file .env.production exec backend alembic upgrade head
#
# NOTE: only Caddy publishes host ports (80/443). Everything else talks over the
# internal Docker network. Interpolated ${VARS} come from --env-file .env.production.

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: jobhunt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobhunt}
      POSTGRES_USER: ${POSTGRES_USER:-jobhunt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhunt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobhunt_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhunt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobhunt}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - cv_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_worker
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhunt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobhunt}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - cv_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_beat
    restart: unless-stopped
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhunt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobhunt}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ── Frontend (static Vite build served by nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: jobhunt_frontend
    restart: unless-stopped
    depends_on:
      - backend

  # ── Caddy (reverse proxy + automatic HTTPS) ─────────────────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: jobhunt_caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redis_data:
  cv_storage:
  caddy_data:
  caddy_config:
