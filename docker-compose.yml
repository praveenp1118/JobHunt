version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: jobhunt_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jobhunt}
      POSTGRES_USER: ${POSTGRES_USER:-jobhunt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobhunt}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: jobhunt_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhunt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobhunt}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - cv_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhunt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobhunt}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
      - cv_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2

  # ── Celery Beat (Scheduler) ─────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobhunt_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobhunt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobhunt}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler

  # ── Frontend (React / Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: jobhunt_frontend
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0 --port 3000

volumes:
  postgres_data:
  redis_data:
  cv_storage:
