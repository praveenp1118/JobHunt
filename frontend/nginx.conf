# SPA static server (behind Caddy, which terminates TLS and routes /api/* to backend).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml font/woff2;

    # Hashed build assets (Vite emits content-hashed filenames) — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static policy pages — public, served before the SPA catch-all (exact match wins over
    # the prefix `location /`, so React can't intercept them). /privacy.html etc. also work
    # via the SPA try_files below (the real file is found before the index.html fallback).
    location = /privacy { try_files /privacy.html =404; }
    location = /terms   { try_files /terms.html =404; }
    location = /cookies { try_files /cookies.html =404; }

    # SPA fallback — every non-file route serves index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html itself must never be cached (so new deploys are picked up).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
