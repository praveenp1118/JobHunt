<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO (crawler-visible; landing lives at "/") ── -->
    <title>AIJobsHunt — AI CV tailoring & ATS scoring, without inventing a thing</title>
    <meta name="description" content="AIJobsHunt scores every role (ATS + Pursuit) and tailors your CV to each job's keywords — without fabricating anything. ₹500/mo, bring your own Claude key." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#059669" />
    <link rel="canonical" href="https://aijobshunt.com/" />

    <!-- ── Icons / PWA ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="AIJobsHunt" />
    <meta property="og:title" content="AIJobsHunt — AI CV tailoring & ATS scoring" />
    <meta property="og:description" content="Scores every role (ATS + Pursuit) and tailors your CV to each job — using only what's already true about you." />
    <meta property="og:url" content="https://aijobshunt.com/" />
    <meta property="og:image" content="https://aijobshunt.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ── Twitter ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AIJobsHunt — AI CV tailoring & ATS scoring" />
    <meta name="twitter:description" content="Scores every role (ATS + Pursuit) and tailors your CV to each job — using only what's already true about you." />
    <meta name="twitter:image" content="https://aijobshunt.com/og-image.png" />

    <!-- ── Fonts: preconnect + preload to cut the round-trip (Space Grotesk / Inter / JetBrains Mono) ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />

    <!-- ── Structured data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "AIJobsHunt",
      "description": "AIJobsHunt scores every role (ATS + Pursuit) and tailors your CV to each job's keywords without fabricating anything, then tracks every application.",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://aijobshunt.com/",
      "offers": {
        "@type": "Offer",
        "price": "500",
        "priceCurrency": "INR",
        "description": "Flat monthly platform fee. AI compute runs on your own Anthropic (Claude) key, billed to you at cost with no markup."
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AIJobsHunt",
      "url": "https://aijobshunt.com/",
      "logo": "https://aijobshunt.com/favicon.svg"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
